{% set name = "nicegui" %}
{% set version = "3.11.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/zauberzeug/nicegui/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4730ae343f10d996bc57bb87a3b88b929eafc0d195202a4f7fc534ea3d5e62b4

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation

requirements:
  build:
    - python >=3.9
    - pip
  host:
    - python {{ python_min }}
    - pip
    - poetry-core >=1.0.0
    - poetry-dynamic-versioning >=1.0.0,<2.0.0
  run:
    - python >={{ python_min }}
    - typing-extensions >=4.0.0
    - markdown2 >=2.4.7,!=2.4.11
    - pygments >=2.20.0,<3.0.0
    - starlette >=0.49.1
    - uvicorn >=0.22.0
    - fastapi >=0.109.1,!=0.123.5
    - python-socketio >=5.14.0
    - watchfiles >=0.18.1
    - jinja2 >=3.1.6,<4
    - python-multipart >=0.0.26
    - orjson >=3.11.5
    - itsdangerous >=2.1.2,<3
    - aiofiles >=23.1.0
    - httpx >=0.24.0
    - ifaddr >=0.2.0
    - aiohttp >=3.13.4
    - docutils >=0.19
    - h11 >=0.16.0
    - python-engineio >=4.12.0
    - certifi >=2024.07.04
    - pydantic-core >=2.35.0
    - lxml >=6.1.0
    - lxml-html-clean >=0.4.4
    - python-dotenv >=1.2.2
    - tinycss2 >=1.4.0,<2


test:
  requires:
    - python {{ python_min }}
  imports:
    - nicegui

about:
  home: https://github.com/zauberzeug/nicegui
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Create web-based interfaces with Python. The nice way.
  doc_url: https://nicegui.io/
  dev_url: https://github.com/zauberzeug/nicegui

extra:
  recipe-maintainers:
    - rodja
    - falkoschindler
